<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seik — Albums</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/theme.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<script src="/js/theme.js"></script>
<style>
/* ── Albums grid ─────────────────────────────────────────── */
.albums-toolbar {
  display: flex; align-items: center; gap: .6rem; margin-bottom: 1.5rem; flex-wrap: wrap;
}
.albums-search {
  flex: 1; min-width: 160px; max-width: 300px;
  background: rgba(255,255,255,.04); border: 1px solid var(--line-strong);
  border-radius: 8px; padding: .48rem .9rem; color: var(--paper);
  font-size: .85rem; font-family: inherit; outline: none; transition: border-color .15s;
}
.albums-search:focus { border-color: var(--accent); }

.albums-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1rem;
}

.album-card {
  border: 1px solid var(--line); border-radius: 14px; overflow: hidden;
  background: rgba(255,255,255,.018);
  display: flex; flex-direction: column;
  transition: border-color .15s, transform .12s;
  cursor: pointer;
}
.album-card:hover { border-color: rgba(255,122,69,.3); transform: translateY(-2px); }
.album-card.pinned { border-color: rgba(255,122,69,.45); }

.album-cover {
  height: 110px; background: rgba(255,255,255,.03);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem; color: rgba(237,234,227,.15); overflow: hidden;
  position: relative;
}
.album-cover img { width: 100%; height: 100%; object-fit: cover; }
.album-cover-icon { font-size: 2rem; color: var(--accent); opacity: .5; }
.album-badges {
  position: absolute; top: .5rem; right: .55rem;
  display: flex; gap: .3rem;
}
.album-badge {
  width: 22px; height: 22px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: .65rem; backdrop-filter: blur(6px);
}
.badge-pin  { background: rgba(255,122,69,.35); color: var(--accent); }
.badge-fav  { background: rgba(226,87,76,.3);   color: #f87171; }

.album-body { padding: 1rem 1rem .8rem; flex: 1; display: flex; flex-direction: column; gap: .35rem; }
.album-name {
  font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: .95rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.album-name-input {
  font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: .95rem;
  background: rgba(255,255,255,.07); border: 1px solid var(--accent);
  border-radius: 6px; padding: .2rem .5rem; color: var(--paper);
  outline: none; width: 100%; box-sizing: border-box;
}
.album-desc {
  font-size: .73rem; color: rgba(237,234,227,.4);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.album-meta {
  font-size: .7rem; font-family: 'JetBrains Mono', monospace;
  color: rgba(237,234,227,.35); margin-top: auto; padding-top: .35rem;
  display: flex; gap: .6rem;
}

.album-actions { display: flex; gap: .35rem; padding: .6rem 1rem; border-top: 1px solid var(--line); }
.icon-btn {
  border: 1px solid var(--line-strong); background: transparent;
  color: rgba(237,234,227,.45); border-radius: 7px;
  width: 30px; height: 30px; display: flex; align-items: center;
  justify-content: center; font-size: .75rem; cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
  flex-shrink: 0;
}
.icon-btn:hover { border-color: rgba(237,234,227,.6); color: var(--paper); }
.icon-btn.active-pin  { border-color: var(--accent); color: var(--accent); background: rgba(255,122,69,.1); }
.icon-btn.active-fav  { border-color: #f87171; color: #f87171; background: rgba(248,113,113,.1); }
.icon-btn.del-btn:hover { border-color: var(--fail); color: var(--fail); }
.icon-btn.edit-btn:hover { border-color: var(--ok); color: var(--ok); }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(5,6,10,.82); z-index: 500;
  display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
}
.modal-backdrop[hidden] { display: none; }
.modal {
  background: var(--ink-2); border: 1px solid var(--line-strong); border-radius: 16px;
  padding: 1.75rem; width: 380px; display: flex; flex-direction: column; gap: 1rem;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
}
.modal-header { display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-family: 'Space Grotesk', sans-serif; margin: 0; font-size: 1rem; }
.modal-close {
  background: transparent; border: 1px solid var(--line-strong); border-radius: 7px;
  color: rgba(237,234,227,.5); width: 28px; height: 28px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: .8rem;
  transition: border-color .15s, color .15s;
}
.modal-close:hover { border-color: var(--fail); color: var(--fail); }
.modal input, .modal textarea {
  background: rgba(255,255,255,.04); border: 1px solid var(--line-strong); border-radius: 8px;
  padding: .55rem .85rem; color: var(--paper); font-size: .875rem; font-family: inherit;
  outline: none; width: 100%; box-sizing: border-box; transition: border-color .15s;
}
.modal input:focus, .modal textarea:focus { border-color: var(--accent); }
.modal textarea { resize: vertical; min-height: 72px; }
.modal-actions { display: flex; gap: .6rem; justify-content: flex-end; }

/* Section divider */
.pinned-section-label {
  font-size: .7rem; font-family: 'JetBrains Mono', monospace;
  color: rgba(237,234,227,.3); text-transform: uppercase; letter-spacing: .08em;
  margin: 1.25rem 0 .5rem; display: flex; align-items: center; gap: .5rem;
}
.pinned-section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--line);
}
</style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="brand"><i class="fa-solid fa-aperture"></i><span>Seik</span></a>
      <nav class="nav">
        <a href="/" class="nav-link"><i class="fa-solid fa-table-cells-large"></i> Dashboard</a>
        <a href="/upload.html" class="nav-link"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</a>
        <a href="/gallery.html" class="nav-link"><i class="fa-solid fa-images"></i> Gallery</a>
        <a href="/albums.html" class="nav-link active"><i class="fa-solid fa-folder-open"></i> Albums</a>
        <a href="/tags.html" class="nav-link"><i class="fa-solid fa-tag"></i> Tags</a>
        <a href="/settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> Settings</a>
      </nav>
      <button class="sidebar-logout" id="logout-btn" title="Sign out"><i class="fa-solid fa-right-from-bracket"></i> Sign out</button>
      <div class="sidebar-foot mono" id="api-status">
        <span class="dot dot-pending"></span> checking…
      </div>
    </aside>

    <main class="dash-main">
      <header class="dash-header">
        <div>
          <h1>Albums</h1>
          <p class="dash-sub" id="total-label">Loading…</p>
        </div>
        <button class="btn btn-accent" id="btn-new-album">
          <i class="fa-solid fa-plus"></i> New album
        </button>
      </header>

      <div class="albums-toolbar">
        <input type="search" class="albums-search" id="albums-search" placeholder="Search albums…" />
        <span class="mono" style="font-size:.72rem;color:rgba(237,234,227,.3)" id="filter-hint"></span>
      </div>

      <div id="albums-container">
        <div class="albums-grid" id="albums-grid"></div>
      </div>
      <div class="gallery-empty" id="albums-empty" hidden>
        <i class="fa-solid fa-folder-open"></i>
        <p>No albums yet. <a href="#" id="empty-cta">Create your first album.</a></p>
      </div>
    </main>
  </div>

  <!-- Create / Edit album modal -->
  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">New album</h3>
        <button class="modal-close" id="btn-modal-close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <input type="text" id="album-name" placeholder="Album name" maxlength="80" />
      <textarea id="album-desc" placeholder="Description (optional)"></textarea>
      <div class="modal-actions">
        <button class="btn" id="btn-cancel">Cancel</button>
        <button class="btn btn-accent" id="btn-save">Create</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav (mobile) -->
  <nav class="bottom-nav" aria-label="Mobile navigation">
    <a href="/" class="bn-link" title="Dashboard"><i class="fa-solid fa-table-cells-large"></i><span>Home</span></a>
    <a href="/upload.html" class="bn-link" title="Upload"><i class="fa-solid fa-cloud-arrow-up"></i><span>Upload</span></a>
    <a href="/gallery.html" class="bn-link" title="Gallery"><i class="fa-solid fa-images"></i><span>Gallery</span></a>
    <a href="/albums.html" class="bn-link active" title="Albums"><i class="fa-solid fa-folder-open"></i><span>Albums</span></a>
    <a href="/tags.html" class="bn-link" title="Tags"><i class="fa-solid fa-tag"></i><span>Tags</span></a>
    <a href="/settings.html" class="bn-link" title="Settings"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
  </nav>

  <script src="/js/albums.js"></script>
<script>
(function(){
  const btn = document.getElementById('logout-btn');
  if (!btn) return;
  btn.addEventListener('click', async () => {
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  });
})();
</script>
</body>
</html>
