<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seik — Albums</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/theme.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<style>
.albums-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem;
}
.album-card{
  border:1px solid var(--line); border-radius:12px; padding:1.2rem 1.1rem;
  background:rgba(255,255,255,.015); cursor:default;
  display:flex; flex-direction:column; gap:.5rem;
  transition:border-color .15s;
}
.album-card:hover{ border-color:rgba(255,122,69,.35); }
.album-icon{ font-size:1.6rem; color:var(--accent); }
.album-name{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:.95rem; }
.album-meta{ font-size:.72rem; font-family:'JetBrains Mono',monospace; color:rgba(237,234,227,.4); }
.album-actions{ display:flex; gap:.4rem; margin-top:.4rem; }
.icon-btn{
  border:1px solid var(--line-strong); background:transparent; color:rgba(237,234,227,.5);
  border-radius:6px; width:28px; height:28px; display:flex; align-items:center;
  justify-content:center; font-size:.75rem; cursor:pointer; transition:border-color .15s, color .15s;
}
.icon-btn:hover{ border-color:var(--fail); color:var(--fail); }

/* Create modal */
.modal-backdrop{
  position:fixed; inset:0; background:rgba(5,6,10,.8); z-index:500;
  display:flex; align-items:center; justify-content:center;
}
.modal-backdrop[hidden]{ display:none; }
.modal{
  background:var(--ink-2); border:1px solid var(--line-strong); border-radius:14px;
  padding:1.75rem; width:360px; display:flex; flex-direction:column; gap:1rem;
}
.modal h3{ font-family:'Space Grotesk',sans-serif; margin:0; font-size:1rem; }
.modal input, .modal textarea{
  background:rgba(255,255,255,.04); border:1px solid var(--line-strong); border-radius:8px;
  padding:.55rem .85rem; color:var(--paper); font-size:.875rem; font-family:inherit;
  outline:none; width:100%; box-sizing:border-box;
}
.modal input:focus, .modal textarea:focus{ border-color:var(--accent); }
.modal textarea{ resize:vertical; min-height:72px; }
.modal-actions{ display:flex; gap:.6rem; justify-content:flex-end; }
</style>
</head>
<body>
  <div class="filmstrip" aria-hidden="true"></div>
  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="brand"><i class="fa-solid fa-aperture"></i><span>Seik</span></a>
      <nav class="nav">
        <a href="/" class="nav-link"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
        <a href="/upload.html" class="nav-link"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</a>
        <a href="/gallery.html" class="nav-link"><i class="fa-solid fa-images"></i> Gallery</a>
        <a href="/albums.html" class="nav-link active"><i class="fa-solid fa-folder-open"></i> Albums</a>
        <a href="/tags.html" class="nav-link"><i class="fa-solid fa-tag"></i> Tags</a>
      </nav>
      <div class="sidebar-foot mono" id="api-status">
        <span class="dot dot-pending"></span> checking…
      </div>
    </aside>

    <main class="dash-main">
      <header class="dash-header">
        <div>
          <h1>Albums</h1>
          <p class="dash-sub" id="total-label">Loading…</p>
        </div>
        <button class="btn btn-accent" id="btn-new-album"><i class="fa-solid fa-plus"></i> New album</button>
      </header>

      <div class="albums-grid" id="albums-grid"></div>
      <div class="gallery-empty" id="albums-empty" hidden>
        <i class="fa-solid fa-folder-open"></i>
        <p>No albums yet. Create one to organise your files.</p>
      </div>
    </main>
  </div>

  <!-- Create album modal -->
  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal">
      <h3>New album</h3>
      <input type="text" id="album-name" placeholder="Album name" maxlength="80" />
      <textarea id="album-desc" placeholder="Description (optional)"></textarea>
      <div class="modal-actions">
        <button class="btn" id="btn-cancel">Cancel</button>
        <button class="btn btn-accent" id="btn-create">Create</button>
      </div>
    </div>
  </div>

  <script src="/js/albums.js"></script>
</body>
</html>
