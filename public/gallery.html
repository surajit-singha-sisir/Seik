<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seik — Gallery</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/theme.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<style>
/* ── Toolbar ────────────────────────────────────── */
.gallery-toolbar {
  display: flex; flex-wrap: wrap; align-items: center; gap: .5rem; margin-bottom: 1.25rem;
}
.gallery-search {
  flex: 1; min-width: 160px; max-width: 260px;
  background: rgba(255,255,255,.04); border: 1px solid var(--line-strong);
  border-radius: 8px; padding: .44rem .85rem; color: var(--paper);
  font-size: .85rem; font-family: inherit; outline: none; transition: border-color .15s;
}
.gallery-search:focus { border-color: var(--accent); }
.filter-btn {
  border: 1px solid var(--line-strong); background: transparent;
  color: rgba(237,234,227,.5); border-radius: 7px;
  padding: .38rem .8rem; font-size: .78rem; cursor: pointer; font-family: inherit;
  transition: border-color .15s, color .15s, background .15s;
}
.filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,122,69,.1); }
.filter-btn.active-pin { border-color: var(--accent); color: var(--accent); background: rgba(255,122,69,.1); }
.filter-btn .fa-heart { color: #f87171; }
.filter-btn.active .fa-heart { color: #f87171; }
.sep { width: 1px; height: 20px; background: var(--line-strong); flex-shrink: 0; }

/* ── Bulk bar ─────────────────────────────────── */
.bulk-bar {
  display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
  background: rgba(255,122,69,.08); border: 1px solid rgba(255,122,69,.25);
  border-radius: 10px; padding: .6rem 1rem; margin-bottom: 1rem;
}
.bulk-bar[hidden] { display: none; }
.bulk-count { font-size: .82rem; color: var(--accent); font-weight: 500; flex: 1; }
.bulk-btn {
  border: 1px solid var(--line-strong); background: transparent;
  color: rgba(237,234,227,.6); border-radius: 7px;
  padding: .32rem .75rem; font-size: .78rem; cursor: pointer; font-family: inherit;
  display: inline-flex; align-items: center; gap: .35rem;
  transition: border-color .15s, color .15s;
}
.bulk-btn:hover { border-color: rgba(237,234,227,.6); color: var(--paper); }
.bulk-btn.del:hover { border-color: var(--fail); color: var(--fail); }

/* ── Gallery grid (page-local overrides) ──────── */
.g-card { position: relative; }
.g-card.g-fav { border-color: rgba(248,113,113,.3); }
.g-card.g-selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,122,69,.25); }

/* Select-mode checkbox overlay */
.g-select-check {
  position: absolute; top: .4rem; left: .4rem; width: 20px; height: 20px;
  border-radius: 5px; border: 1.5px solid rgba(255,255,255,.4);
  background: rgba(5,6,10,.6); display: none; align-items: center;
  justify-content: center; font-size: .65rem; color: var(--accent); z-index: 2;
}
.select-mode .g-select-check { display: flex; }
.g-selected .g-select-check { background: var(--accent); border-color: var(--accent); color: #1a0a04; }

.g-fav-badge {
  position: absolute; top: .4rem; right: .4rem;
  color: #f87171; font-size: .7rem; z-index: 2;
}
.g-size { font-size:.63rem; }

/* ── Pagination ──────────────────────────────── */
.pagination { display:flex; align-items:center; gap:.5rem; margin-top:1.25rem; justify-content:center; }
.pagination[hidden] { display:none; }
.page-btn {
  border:1px solid var(--line-strong); background:transparent; color:rgba(237,234,227,.5);
  border-radius:7px; width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  font-size:.8rem; cursor:pointer; transition:border-color .15s,color .15s;
}
.page-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
.page-btn:disabled { opacity:.3; cursor:default; }
#page-info { font-size:.78rem; font-family:'JetBrains Mono',monospace; color:rgba(237,234,227,.4); min-width:52px; text-align:center; }
</style>
</head>
<body>
<div class="filmstrip" aria-hidden="true"></div>
<div class="layout">
  <aside class="sidebar">
    <a href="/" class="brand"><i class="fa-solid fa-aperture"></i><span>Seik</span></a>
    <nav class="nav">
      <a href="/" class="nav-link"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
      <a href="/upload.html" class="nav-link"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</a>
      <a href="/gallery.html" class="nav-link active"><i class="fa-solid fa-images"></i> Gallery</a>
      <a href="/albums.html" class="nav-link"><i class="fa-solid fa-folder-open"></i> Albums</a>
      <a href="/tags.html" class="nav-link"><i class="fa-solid fa-tag"></i> Tags</a>
    </nav>
    <div class="sidebar-foot mono" id="api-status"><span class="dot dot-pending"></span> checking…</div>
  </aside>
  <main class="dash-main">
    <header class="dash-header">
      <div><h1>Gallery</h1><p class="dash-sub" id="gallery-count">Loading…</p></div>
    </header>
    <!-- Toolbar -->
    <div class="gallery-toolbar">
      <input type="search" class="gallery-search" id="gallery-search" placeholder="Search files…" />
      <div class="sep"></div>
      <button class="filter-btn active" data-mime="">All</button>
      <button class="filter-btn" data-mime="image/">Images</button>
      <button class="filter-btn" data-mime="application/pdf">PDF</button>
      <div class="sep"></div>
      <button class="filter-btn" id="filter-fav" title="Favourites only"><i class="fa-regular fa-heart"></i> Favs</button>
      <button class="filter-btn" id="btn-select" title="Select multiple"><i class="fa-solid fa-check-square"></i> Select</button>
    </div>

    <!-- Bulk action bar (shown in select mode) -->
    <div class="bulk-bar" id="bulk-bar" hidden>
      <span class="bulk-count" id="bulk-count">0 selected</span>
      <button class="bulk-btn" id="bulk-fav"><i class="fa-solid fa-heart"></i> Favourite</button>
      <button class="bulk-btn" id="bulk-move"><i class="fa-solid fa-folder-open"></i> Move to album</button>
      <button class="bulk-btn del" id="bulk-delete"><i class="fa-solid fa-trash"></i> Delete</button>
      <button class="bulk-btn" id="bulk-cancel"><i class="fa-solid fa-xmark"></i> Cancel</button>
    </div>

    <div class="gallery" id="gallery"></div>
    <div class="gallery-empty" id="gallery-empty" hidden>
      <i class="fa-solid fa-images"></i>
      <p>No files yet. <a href="/upload.html">Upload something.</a></p>
    </div>
    <div class="pagination" id="pagination" hidden>
      <button class="page-btn" id="page-prev"><i class="fa-solid fa-chevron-left"></i></button>
      <span id="page-info">1 / 1</span>
      <button class="page-btn" id="page-next"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </main>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" hidden>
  <button class="lb-close" id="lb-close"><i class="fa-solid fa-xmark"></i></button>
  <img class="lb-img" id="lb-img" src="" alt="" />
  <div class="lb-meta" id="lb-meta"></div>
  <div class="lb-actions">
    <button class="lb-act-btn" id="lb-copy" title="Copy link"><i class="fa-solid fa-link"></i></button>
    <button class="lb-act-btn" id="lb-download" title="Download"><i class="fa-solid fa-download"></i></button>
    <button class="lb-act-btn" id="lb-fav" title="Favourite"><i class="fa-regular fa-heart"></i></button>
    <button class="lb-act-btn" id="lb-qr" title="QR code"><i class="fa-solid fa-qrcode"></i></button>
    <button class="lb-act-btn" id="lb-info" title="File details"><i class="fa-solid fa-circle-info"></i></button>
  </div>
</div>

<!-- QR Modal -->
<div class="modal-backdrop" id="qr-modal" hidden>
  <div class="modal" style="align-items:center;text-align:center;gap:.75rem">
    <div class="modal-header" style="width:100%">
      <h3><i class="fa-solid fa-qrcode"></i> QR Code</h3>
      <button class="modal-close" id="qr-modal-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <p id="qr-filename" style="font-size:.78rem;color:rgba(237,234,227,.45);max-width:280px;word-break:break-all"></p>
    <img id="qr-img" src="" alt="QR Code" style="background:#EDEAE3;padding:12px;border-radius:10px" />
    <a id="qr-link" class="btn btn-accent" download style="margin-top:.25rem"><i class="fa-solid fa-download"></i> Download PNG</a>
  </div>
</div>

<!-- File info / EXIF panel -->
<div class="modal-backdrop" id="info-panel" hidden>
  <div class="modal" style="width:420px;max-width:95vw">
    <div class="modal-header">
      <h3><i class="fa-solid fa-circle-info"></i> File details</h3>
      <button class="modal-close" id="info-panel-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="info-loading" style="text-align:center;padding:1.5rem;color:rgba(237,234,227,.4)">
      <i class="fa-solid fa-spinner fa-spin"></i> Loading…
    </div>
    <div id="info-content"></div>
    <div style="display:flex;gap:.5rem;margin-top:.5rem;justify-content:flex-end">
      <button class="btn" id="info-copy"><i class="fa-solid fa-link"></i> Copy link</button>
      <button class="btn" id="info-qr"><i class="fa-solid fa-qrcode"></i> QR</button>
      <button class="btn btn-accent" id="info-dl"><i class="fa-solid fa-download"></i> Download</button>
    </div>
  </div>
</div>

<!-- Album pick modal (bulk move) -->
<div class="modal-backdrop" id="album-pick-modal" hidden>
  <div class="modal" style="width:340px">
    <div class="modal-header">
      <h3>Move to album</h3>
      <button class="modal-close" id="album-pick-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="album-pick-list" style="display:flex;flex-direction:column;gap:.4rem;max-height:300px;overflow-y:auto"></div>
  </div>
</div>

<script type="module" src="/js/gallery.js"></script>
</body>
</html>
