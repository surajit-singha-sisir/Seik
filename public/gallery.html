<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seik — Gallery</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/theme.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<style>
.toolbar{ display:flex; gap:.6rem; align-items:center; flex-wrap:wrap; margin-bottom:1.5rem; }
.toolbar input{
  flex:1; min-width:180px; background:rgba(255,255,255,.04); border:1px solid var(--line-strong);
  border-radius:8px; padding:.5rem .9rem; color:var(--paper); font-size:.85rem; outline:none;
  font-family:inherit;
}
.toolbar input:focus{ border-color:var(--accent); }
.filter-btn{
  border:1px solid var(--line-strong); background:transparent; color:rgba(237,234,227,.6);
  border-radius:8px; padding:.45rem .85rem; font-size:.8rem; cursor:pointer;
  font-family:inherit; transition:border-color .15s, color .15s, background .15s;
}
.filter-btn.active, .filter-btn:hover{ border-color:var(--accent); color:var(--accent); background:rgba(255,122,69,.08); }
.pagination{ display:flex; gap:.4rem; align-items:center; margin-top:1.5rem; }
.page-btn{
  border:1px solid var(--line-strong); background:transparent; color:rgba(237,234,227,.6);
  border-radius:7px; padding:.35rem .75rem; font-size:.8rem; cursor:pointer; font-family:inherit;
  transition:border-color .15s, color .15s;
}
.page-btn:disabled{ opacity:.3; pointer-events:none; }
.page-btn.active{ border-color:var(--accent); color:var(--accent); }
.page-info{ font-size:.78rem; color:rgba(237,234,227,.4); font-family:'JetBrains Mono',monospace; margin:0 .5rem; }
</style>
</head>
<body>
  <div class="filmstrip" aria-hidden="true"></div>
  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="brand"><i class="fa-solid fa-aperture"></i><span>Seik</span></a>
      <nav class="nav">
        <a href="/" class="nav-link"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
        <a href="/upload.html" class="nav-link"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</a>
        <a href="/gallery.html" class="nav-link active"><i class="fa-solid fa-images"></i> Gallery</a>
        <a href="/albums.html" class="nav-link"><i class="fa-solid fa-folder-open"></i> Albums</a>
        <a href="/tags.html" class="nav-link"><i class="fa-solid fa-tag"></i> Tags</a>
      </nav>
      <div class="sidebar-foot mono" id="api-status">
        <span class="dot dot-pending"></span> checking…
      </div>
    </aside>

    <main class="dash-main">
      <header class="dash-header">
        <div>
          <h1>Gallery</h1>
          <p class="dash-sub" id="total-label">Loading…</p>
        </div>
        <a href="/upload.html" class="btn btn-accent"><i class="fa-solid fa-plus"></i> Upload</a>
      </header>

      <div class="toolbar">
        <input type="search" id="search" placeholder="Search filenames…" />
        <button class="filter-btn active" data-mime="">All</button>
        <button class="filter-btn" data-mime="image">Images</button>
        <button class="filter-btn" data-mime="application/pdf">PDFs</button>
      </div>

      <div class="gallery" id="gallery"></div>
      <div class="gallery-empty" id="gallery-empty" hidden>
        <i class="fa-solid fa-images"></i>
        <p>No files found. <a href="/upload.html">Upload something →</a></p>
      </div>

      <div class="pagination" id="pagination" hidden>
        <button class="page-btn" id="btn-prev"><i class="fa-solid fa-chevron-left"></i></button>
        <span class="page-info" id="page-info"></span>
        <button class="page-btn" id="btn-next"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </main>
  </div>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lb-close" id="lb-close"><i class="fa-solid fa-xmark"></i></button>
    <img class="lb-img" id="lb-img" src="" alt="" />
    <div class="lb-meta" id="lb-meta"></div>
  </div>

  <script src="/js/gallery.js"></script>
</body>
</html>
