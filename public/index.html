<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seik — Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/theme.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <div class="filmstrip" aria-hidden="true"></div>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="/" class="brand"><i class="fa-solid fa-aperture"></i><span>Seik</span></a>
      <nav class="nav">
        <a href="/" class="nav-link active"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
        <a href="/upload.html" class="nav-link"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</a>
        <a href="/gallery.html" class="nav-link"><i class="fa-solid fa-images"></i> Gallery</a>
        <a href="/albums.html" class="nav-link"><i class="fa-solid fa-folder-open"></i> Albums</a>
        <a href="/tags.html" class="nav-link"><i class="fa-solid fa-tag"></i> Tags</a>
      </nav>
      <div class="sidebar-foot mono" id="api-status">
        <span class="dot dot-pending"></span> checking…
      </div>
    </aside>

    <!-- Main -->
    <main class="dash-main">
      <header class="dash-header">
        <div>
          <h1>Dashboard</h1>
          <p class="dash-sub" id="dash-date"></p>
        </div>
        <a href="/upload.html" class="btn btn-accent"><i class="fa-solid fa-plus"></i> Upload</a>
      </header>

      <!-- Stats row -->
      <div class="stats-row" id="stats-row">
        <div class="stat-card">
          <i class="fa-solid fa-file-image stat-icon"></i>
          <div>
            <div class="stat-value" id="stat-files">—</div>
            <div class="stat-label">Files</div>
          </div>
        </div>
        <div class="stat-card">
          <i class="fa-solid fa-weight-hanging stat-icon"></i>
          <div>
            <div class="stat-value" id="stat-size">—</div>
            <div class="stat-label">Stored</div>
          </div>
        </div>
        <div class="stat-card">
          <i class="fa-solid fa-folder-open stat-icon"></i>
          <div>
            <div class="stat-value" id="stat-albums">—</div>
            <div class="stat-label">Albums</div>
          </div>
        </div>
        <div class="stat-card">
          <i class="fa-solid fa-compress stat-icon"></i>
          <div>
            <div class="stat-value" id="stat-saved">—</div>
            <div class="stat-label">Saved by compression</div>
          </div>
        </div>
      </div>

      <!-- Recent uploads -->
      <section class="section">
        <div class="section-head">
          <h2>Recent uploads</h2>
          <span class="mono" id="recent-count"></span>
        </div>
        <div class="gallery" id="gallery"></div>
        <div class="gallery-empty" id="gallery-empty" hidden>
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p>No files yet. <a href="/upload.html">Upload something →</a></p>
          </div>
      </section>
    </main>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lb-close" id="lb-close"><i class="fa-solid fa-xmark"></i></button>
    <img class="lb-img" id="lb-img" src="" alt="" />
    <div class="lb-meta" id="lb-meta"></div>
    <div class="lb-actions">
      <button class="lb-act-btn" id="lb-copy" title="Copy link"><i class="fa-solid fa-link"></i></button>
      <button class="lb-act-btn" id="lb-download" title="Download"><i class="fa-solid fa-download"></i></button>
      <button class="lb-act-btn" id="lb-fav" title="Favourite"><i class="fa-regular fa-heart"></i></button>
      <button class="lb-act-btn" id="lb-qr" title="QR code"><i class="fa-solid fa-qrcode"></i></button>
      <button class="lb-act-btn" id="lb-info" title="File details"><i class="fa-solid fa-circle-info"></i></button>
    </div>
  </div>

  <!-- QR Modal -->
  <div class="modal-backdrop" id="qr-modal" hidden>
    <div class="modal" style="align-items:center;text-align:center;gap:.75rem">
      <div class="modal-header" style="width:100%">
        <h3><i class="fa-solid fa-qrcode"></i> QR Code</h3>
        <button class="modal-close" id="qr-modal-close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <p id="qr-filename" style="font-size:.78rem;color:rgba(237,234,227,.45);max-width:280px;word-break:break-all"></p>
      <img id="qr-img" src="" alt="QR Code" style="background:#EDEAE3;padding:12px;border-radius:10px" />
      <a id="qr-link" class="btn btn-accent" download style="margin-top:.25rem"><i class="fa-solid fa-download"></i> Download PNG</a>
    </div>
  </div>

  <!-- File info / EXIF panel -->
  <div class="modal-backdrop" id="info-panel" hidden>
    <div class="modal" style="width:420px;max-width:95vw">
      <div class="modal-header">
        <h3><i class="fa-solid fa-circle-info"></i> File details</h3>
        <button class="modal-close" id="info-panel-close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="info-loading" style="text-align:center;padding:1.5rem;color:rgba(237,234,227,.4)">
        <i class="fa-solid fa-spinner fa-spin"></i> Loading…
      </div>
      <div id="info-content"></div>
      <div style="display:flex;gap:.5rem;margin-top:.5rem;justify-content:flex-end">
        <button class="btn" id="info-copy"><i class="fa-solid fa-link"></i> Copy link</button>
        <button class="btn" id="info-qr"><i class="fa-solid fa-qrcode"></i> QR</button>
        <button class="btn btn-accent" id="info-dl"><i class="fa-solid fa-download"></i> Download</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav (mobile) -->
  <nav class="bottom-nav" aria-label="Mobile navigation">
    <a href="/" class="bn-link active" title="Dashboard"><i class="fa-solid fa-grid-2"></i><span>Home</span></a>
    <a href="/upload.html" class="bn-link" title="Upload"><i class="fa-solid fa-cloud-arrow-up"></i><span>Upload</span></a>
    <a href="/gallery.html" class="bn-link" title="Gallery"><i class="fa-solid fa-images"></i><span>Gallery</span></a>
    <a href="/albums.html" class="bn-link" title="Albums"><i class="fa-solid fa-folder-open"></i><span>Albums</span></a>
    <a href="/tags.html" class="bn-link" title="Tags"><i class="fa-solid fa-tag"></i><span>Tags</span></a>
  </nav>

  <script src="/js/dashboard.js"></script>
</body>
</html>
