<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seik — Tags</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/theme.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<style>
.tags-grid{
  display:flex; flex-wrap:wrap; gap:.6rem; align-content:flex-start;
}
.tag-chip{
  display:inline-flex; align-items:center; gap:.55rem;
  border:1px solid var(--line-strong); border-radius:999px;
  padding:.4rem 1rem .4rem .85rem; font-size:.82rem;
  background:rgba(255,255,255,.03); transition:border-color .15s;
}
.tag-chip:hover{ border-color:rgba(255,122,69,.4); }
.tag-name{ font-weight:500; }
.tag-count{ font-family:'JetBrains Mono',monospace; font-size:.7rem; color:rgba(237,234,227,.4); }
.tag-del{
  border:none; background:transparent; color:rgba(237,234,227,.3);
  cursor:pointer; font-size:.75rem; padding:0; line-height:1;
  transition:color .15s;
}
.tag-del:hover{ color:var(--fail); }

.create-row{
  display:flex; gap:.6rem; margin-bottom:1.5rem; max-width:400px;
}
.create-row input{
  flex:1; background:rgba(255,255,255,.04); border:1px solid var(--line-strong);
  border-radius:8px; padding:.5rem .9rem; color:var(--paper); font-size:.875rem;
  font-family:inherit; outline:none;
}
.create-row input:focus{ border-color:var(--accent); }
</style>
</head>
<body>
  <div class="filmstrip" aria-hidden="true"></div>
  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="brand"><i class="fa-solid fa-aperture"></i><span>Seik</span></a>
      <nav class="nav">
        <a href="/" class="nav-link"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
        <a href="/upload.html" class="nav-link"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</a>
        <a href="/gallery.html" class="nav-link"><i class="fa-solid fa-images"></i> Gallery</a>
        <a href="/albums.html" class="nav-link"><i class="fa-solid fa-folder-open"></i> Albums</a>
        <a href="/tags.html" class="nav-link active"><i class="fa-solid fa-tag"></i> Tags</a>
      </nav>
      <div class="sidebar-foot mono" id="api-status">
        <span class="dot dot-pending"></span> checking…
      </div>
    </aside>

    <main class="dash-main">
      <header class="dash-header">
        <div>
          <h1>Tags</h1>
          <p class="dash-sub" id="total-label">Loading…</p>
        </div>
      </header>

      <div class="create-row">
        <input type="text" id="tag-input" placeholder="New tag name…" maxlength="40" />
        <button class="btn btn-accent" id="btn-add-tag"><i class="fa-solid fa-plus"></i> Add</button>
      </div>

      <div class="tags-grid" id="tags-grid"></div>
      <div class="gallery-empty" id="tags-empty" hidden>
        <i class="fa-solid fa-tag"></i>
        <p>No tags yet. Add one above to start tagging files.</p>
      </div>
    </main>
  </div>

  <script src="/js/tags.js"></script>
</body>
</html>
