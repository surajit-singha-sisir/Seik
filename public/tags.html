<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seik — Tags</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/theme.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<script src="/js/theme.js"></script>
<style>
/* ── Tags layout ─────────────────────────────────────────── */
.tags-toolbar {
  display: flex; gap: .6rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
}
.tags-search {
  flex: 1; min-width: 160px; max-width: 280px;
  background: rgba(255,255,255,.04); border: 1px solid var(--line-strong);
  border-radius: 8px; padding: .48rem .9rem; color: var(--paper);
  font-size: .85rem; font-family: inherit; outline: none; transition: border-color .15s;
}
.tags-search:focus { border-color: var(--accent); }

/* ── Grid ────────────────────────────────────────────────── */
.tags-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: .75rem;
}

.tag-card {
  border: 1px solid var(--line); border-radius: 12px;
  background: rgba(255,255,255,.018);
  padding: .85rem 1rem;
  display: flex; flex-direction: column; gap: .55rem;
  transition: border-color .15s, transform .12s;
  cursor: pointer;
}
.tag-card:hover { border-color: rgba(255,122,69,.28); transform: translateY(-1px); }

.tag-card-header {
  display: flex; align-items: center; gap: .5rem;
}
.tag-icon { color: var(--accent); font-size: .8rem; }
.tag-card-name {
  font-weight: 600; font-size: .92rem;
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tag-edit-input {
  font-weight: 600; font-size: .88rem; flex: 1;
  background: rgba(255,255,255,.07); border: 1px solid var(--accent);
  border-radius: 6px; padding: .15rem .45rem; color: var(--paper);
  outline: none; min-width: 0;
}

.tag-meta {
  font-size: .7rem; font-family: 'JetBrains Mono', monospace;
  color: rgba(237,234,227,.35);
  display: flex; align-items: center; gap: .5rem;
}
.tag-count-badge {
  display: inline-flex; align-items: center; gap: .25rem;
  background: rgba(255,122,69,.1); border: 1px solid rgba(255,122,69,.2);
  border-radius: 999px; padding: .1rem .5rem;
  font-size: .68rem; color: rgba(237,234,227,.55);
}

.tag-actions {
  display: flex; gap: .3rem; margin-top: auto;
}
.tag-btn {
  border: 1px solid var(--line-strong); background: transparent;
  color: rgba(237,234,227,.45); border-radius: 7px;
  height: 26px; padding: 0 .55rem; font-size: .72rem;
  display: inline-flex; align-items: center; gap: .3rem;
  cursor: pointer; font-family: inherit;
  transition: border-color .15s, color .15s, background .15s;
}
.tag-btn:hover { border-color: rgba(237,234,227,.6); color: var(--paper); }
.tag-btn.del:hover { border-color: var(--fail); color: var(--fail); }
.tag-btn.save:hover { border-color: var(--ok); color: var(--ok); }
.tag-btn.cancel:hover { border-color: rgba(237,234,227,.5); color: rgba(237,234,227,.6); }

/* Sort selector */
.sort-select {
  background: rgba(255,255,255,.04); border: 1px solid var(--line-strong);
  border-radius: 8px; padding: .45rem .75rem; color: var(--paper);
  font-size: .8rem; font-family: inherit; outline: none; cursor: pointer;
  transition: border-color .15s;
}
.sort-select:focus { border-color: var(--accent); }

/* Slug chip */
.tag-slug {
  font-family: 'JetBrains Mono', monospace; font-size: .65rem;
  color: rgba(237,234,227,.25); display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(5,6,10,.82); z-index: 500;
  display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
}
.modal-backdrop[hidden] { display: none; }
.modal {
  background: var(--ink-2); border: 1px solid var(--line-strong); border-radius: 16px;
  padding: 1.75rem; width: 380px; display: flex; flex-direction: column; gap: 1rem;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
}
.modal-header { display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-family: 'Space Grotesk', sans-serif; margin: 0; font-size: 1rem; }
.modal-close {
  background: transparent; border: 1px solid var(--line-strong); border-radius: 7px;
  color: rgba(237,234,227,.5); width: 28px; height: 28px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: .8rem;
  transition: border-color .15s, color .15s;
}
.modal-close:hover { border-color: var(--fail); color: var(--fail); }
.modal input {
  background: rgba(255,255,255,.04); border: 1px solid var(--line-strong); border-radius: 8px;
  padding: .55rem .85rem; color: var(--paper); font-size: .875rem; font-family: inherit;
  outline: none; width: 100%; box-sizing: border-box; transition: border-color .15s;
}
.modal input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: .6rem; justify-content: flex-end; }
</style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="brand"><i class="fa-solid fa-aperture"></i><span>Seik</span></a>
      <nav class="nav">
        <a href="/" class="nav-link"><i class="fa-solid fa-table-cells-large"></i> Dashboard</a>
        <a href="/upload.html" class="nav-link"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</a>
        <a href="/gallery.html" class="nav-link"><i class="fa-solid fa-images"></i> Gallery</a>
        <a href="/albums.html" class="nav-link"><i class="fa-solid fa-folder-open"></i> Albums</a>
        <a href="/tags.html" class="nav-link active"><i class="fa-solid fa-tag"></i> Tags</a>
        <a href="/settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> Settings</a>
      </nav>
      <button class="sidebar-logout" id="logout-btn" title="Sign out"><i class="fa-solid fa-right-from-bracket"></i> Sign out</button>
      <div class="sidebar-foot mono" id="api-status">
        <span class="dot dot-pending"></span> checking…
      </div>
    </aside>

    <main class="dash-main">
      <header class="dash-header">
        <div>
          <h1>Tags</h1>
          <p class="dash-sub" id="total-label">Loading…</p>
        </div>
        <button class="btn btn-accent" id="btn-new-tag">
          <i class="fa-solid fa-plus"></i> New tag
        </button>
      </header>

      <div class="tags-toolbar">
        <input type="search" class="tags-search" id="tags-search" placeholder="Search tags…" />

        <select class="sort-select" id="sort-select">
          <option value="usage">Sort: by usage</option>
          <option value="name">Sort: A → Z</option>
          <option value="date">Sort: newest</option>
        </select>
      </div>

      <div class="tags-grid" id="tags-grid"></div>
      <div class="gallery-empty" id="tags-empty" hidden>
        <i class="fa-solid fa-tag"></i>
        <p>No tags yet. <a href="#" id="empty-cta">Add one to start tagging files.</a></p>
      </div>
    </main>
  </div>

  <!-- Create tag modal -->
  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">New tag</h3>
        <button class="modal-close" id="btn-modal-close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <input type="text" id="tag-name" placeholder="Tag name" maxlength="40" />
      <div class="modal-actions">
        <button class="btn" id="btn-cancel">Cancel</button>
        <button class="btn btn-accent" id="btn-save">Create</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav (mobile) -->
  <nav class="bottom-nav" aria-label="Mobile navigation">
    <a href="/" class="bn-link" title="Dashboard"><i class="fa-solid fa-table-cells-large"></i><span>Home</span></a>
    <a href="/upload.html" class="bn-link" title="Upload"><i class="fa-solid fa-cloud-arrow-up"></i><span>Upload</span></a>
    <a href="/gallery.html" class="bn-link" title="Gallery"><i class="fa-solid fa-images"></i><span>Gallery</span></a>
    <a href="/albums.html" class="bn-link" title="Albums"><i class="fa-solid fa-folder-open"></i><span>Albums</span></a>
    <a href="/tags.html" class="bn-link active" title="Tags"><i class="fa-solid fa-tag"></i><span>Tags</span></a>
    <a href="/settings.html" class="bn-link" title="Settings"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
  </nav>

  <script src="/js/tags.js"></script>
<script>
(function(){
  const btn = document.getElementById('logout-btn');
  if (!btn) return;
  btn.addEventListener('click', async () => {
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  });
})();
</script>
</body>
</html>
