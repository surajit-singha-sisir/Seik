<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seik — Tag</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/theme.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
<style>
.back-link {
  display: inline-flex; align-items: center; gap: .4rem;
  color: rgba(237,234,227,.45); font-size: .78rem; text-decoration: none;
  margin-bottom: .75rem; transition: color .15s;
}
.back-link:hover { color: var(--accent); }

.detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
.detail-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; margin: 0 0 .3rem; display: flex; align-items: center; gap: .55rem; }
.detail-title i { color: var(--accent); font-size: 1.1rem; }
.detail-slug { font-family: 'JetBrains Mono', monospace; font-size: .78rem; color: rgba(237,234,227,.3); margin: 0 0 .4rem; }
.detail-meta { font-size: .75rem; font-family: 'JetBrains Mono', monospace; color: rgba(237,234,227,.35); display: flex; gap: .8rem; align-items: center; }
.detail-actions { display: flex; gap: .5rem; flex-shrink: 0; }
.icon-btn {
  border: 1px solid var(--line-strong); background: transparent;
  color: rgba(237,234,227,.5); border-radius: 7px;
  width: 34px; height: 34px; display: flex; align-items: center;
  justify-content: center; font-size: .8rem; cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
}
.icon-btn:hover { border-color: rgba(237,234,227,.6); color: var(--paper); }
.icon-btn.del-btn:hover { border-color: var(--fail); color: var(--fail); }

/* File card with remove-from-tag affordance */
.g-card { position: relative; }
.g-remove {
  position: absolute; top: .35rem; right: .35rem; width: 24px; height: 24px;
  border-radius: 7px; border: 1px solid rgba(255,255,255,.15);
  background: rgba(5,6,10,.7); color: rgba(237,234,227,.7);
  display: flex; align-items: center; justify-content: center;
  font-size: .68rem; cursor: pointer; backdrop-filter: blur(4px);
  transition: border-color .15s, color .15s, background .15s; z-index: 2;
}
.g-remove:hover { border-color: var(--fail); color: var(--fail); background: rgba(226,87,76,.18); }

/* Modal (rename) */
.modal-backdrop { position: fixed; inset: 0; background: rgba(5,6,10,.82); z-index: 500; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-backdrop[hidden] { display: none; }
.modal { background: var(--ink-2); border: 1px solid var(--line-strong); border-radius: 16px; padding: 1.75rem; width: 380px; display: flex; flex-direction: column; gap: 1rem; box-shadow: 0 24px 60px rgba(0,0,0,.5); }
.modal-header { display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-family: 'Space Grotesk', sans-serif; margin: 0; font-size: 1rem; }
.modal-close { background: transparent; border: 1px solid var(--line-strong); border-radius: 7px; color: rgba(237,234,227,.5); width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .8rem; transition: border-color .15s, color .15s; }
.modal-close:hover { border-color: var(--fail); color: var(--fail); }
.modal input { background: rgba(255,255,255,.04); border: 1px solid var(--line-strong); border-radius: 8px; padding: .55rem .85rem; color: var(--paper); font-size: .875rem; font-family: inherit; outline: none; width: 100%; box-sizing: border-box; transition: border-color .15s; }
.modal input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: .6rem; justify-content: flex-end; }
</style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="brand"><i class="fa-solid fa-aperture"></i><span>Seik</span></a>
      <nav class="nav">
        <a href="/" class="nav-link"><i class="fa-solid fa-table-cells-large"></i> Dashboard</a>
        <a href="/upload.html" class="nav-link"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</a>
        <a href="/gallery.html" class="nav-link"><i class="fa-solid fa-images"></i> Gallery</a>
        <a href="/albums.html" class="nav-link"><i class="fa-solid fa-folder-open"></i> Albums</a>
        <a href="/tags.html" class="nav-link active"><i class="fa-solid fa-tag"></i> Tags</a>
      </nav>
      <button class="sidebar-logout" id="logout-btn" title="Sign out"><i class="fa-solid fa-right-from-bracket"></i> Sign out</button>
      <div class="sidebar-foot mono" id="api-status">
        <span class="dot dot-pending"></span> checking…
      </div>
    </aside>

    <main class="dash-main">
      <a href="/tags.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> All tags</a>

      <div class="detail-header" id="detail-header" hidden>
        <div>
          <h1 class="detail-title"><i class="fa-solid fa-tag"></i> <span id="tag-name"></span></h1>
          <p class="detail-slug" id="tag-slug"></p>
          <div class="detail-meta">
            <span id="tag-count"></span>
            <span id="tag-date"></span>
          </div>
        </div>
        <div class="detail-actions">
          <button class="icon-btn" id="btn-rename" title="Rename tag"><i class="fa-solid fa-pen"></i></button>
          <button class="icon-btn del-btn" id="btn-delete" title="Delete tag"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>

      <div class="gallery" id="gallery"></div>
      <div class="gallery-empty" id="empty" hidden>
        <i class="fa-solid fa-tag"></i>
        <p>No files tagged yet. <a href="/gallery.html">Go to the gallery</a> and add some.</p>
      </div>
    </main>
  </div>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lb-close" id="lb-close"><i class="fa-solid fa-xmark"></i></button>
    <img class="lb-img" id="lb-img" src="" alt="" />
    <div class="lb-meta" id="lb-meta"></div>
    <div class="lb-actions">
      <button class="lb-act-btn" id="lb-copy" title="Copy link"><i class="fa-solid fa-link"></i></button>
      <button class="lb-act-btn" id="lb-download" title="Download"><i class="fa-solid fa-download"></i></button>
      <button class="lb-act-btn" id="lb-fav" title="Favourite"><i class="fa-regular fa-heart"></i></button>
      <button class="lb-act-btn" id="lb-qr" title="QR code"><i class="fa-solid fa-qrcode"></i></button>
      <button class="lb-act-btn" id="lb-info" title="File details"><i class="fa-solid fa-circle-info"></i></button>
    </div>
  </div>

  <!-- QR Modal -->
  <div class="modal-backdrop" id="qr-modal" hidden style="z-index:1100">
    <div class="modal" style="align-items:center;text-align:center;gap:.75rem">
      <div class="modal-header" style="width:100%">
        <h3><i class="fa-solid fa-qrcode"></i> QR Code</h3>
        <button class="modal-close" id="qr-modal-close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <p id="qr-filename" style="font-size:.78rem;color:rgba(237,234,227,.45);max-width:280px;word-break:break-all"></p>
      <div id="qr-canvas-wrap" style="background:#EDEAE3;padding:12px;border-radius:10px;min-width:196px;min-height:196px;display:flex;align-items:center;justify-content:center"></div>
      <a id="qr-link" class="btn btn-accent" download style="margin-top:.25rem"><i class="fa-solid fa-download"></i> Download PNG</a>
    </div>
  </div>

  <!-- File info / EXIF panel -->
  <div class="modal-backdrop" id="info-panel" hidden style="z-index:1100">
    <div class="modal" style="width:420px;max-width:95vw">
      <div class="modal-header">
        <h3><i class="fa-solid fa-circle-info"></i> File details</h3>
        <button class="modal-close" id="info-panel-close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="info-loading" style="text-align:center;padding:1.5rem;color:rgba(237,234,227,.4)">
        <i class="fa-solid fa-spinner fa-spin"></i> Loading…
      </div>
      <div id="info-content"></div>
      <div style="display:flex;gap:.5rem;margin-top:.5rem;justify-content:flex-end">
        <button class="btn" id="info-copy"><i class="fa-solid fa-link"></i> Copy link</button>
        <button class="btn" id="info-qr"><i class="fa-solid fa-qrcode"></i> QR</button>
        <button class="btn btn-accent" id="info-dl"><i class="fa-solid fa-download"></i> Download</button>
      </div>
    </div>
  </div>

  <!-- Rename tag modal -->
  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3>Rename tag</h3>
        <button class="modal-close" id="btn-modal-close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <input type="text" id="edit-name" placeholder="Tag name" maxlength="40" />
      <div class="modal-actions">
        <button class="btn" id="btn-cancel">Cancel</button>
        <button class="btn btn-accent" id="btn-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav (mobile) -->
  <nav class="bottom-nav" aria-label="Mobile navigation">
    <a href="/" class="bn-link" title="Dashboard"><i class="fa-solid fa-table-cells-large"></i><span>Home</span></a>
    <a href="/upload.html" class="bn-link" title="Upload"><i class="fa-solid fa-cloud-arrow-up"></i><span>Upload</span></a>
    <a href="/gallery.html" class="bn-link" title="Gallery"><i class="fa-solid fa-images"></i><span>Gallery</span></a>
    <a href="/albums.html" class="bn-link" title="Albums"><i class="fa-solid fa-folder-open"></i><span>Albums</span></a>
    <a href="/tags.html" class="bn-link active" title="Tags"><i class="fa-solid fa-tag"></i><span>Tags</span></a>
  </nav>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/js/tag-detail.js"></script>
<script>
(function(){
  const btn = document.getElementById('logout-btn');
  if (!btn) return;
  btn.addEventListener('click', async () => {
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  });
})();
</script>
</body>
</html>
