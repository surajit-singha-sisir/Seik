<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seik — Sign In</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/theme.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--ink);
    padding: 1.5rem;
  }

  .card {
    background: var(--ink-2);
    border: 1px solid var(--line-strong);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 24px 64px rgba(0,0,0,.45);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: .55rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--paper);
    margin-bottom: 2rem;
    text-decoration: none;
  }
  .brand i { color: var(--accent); }
  .brand small {
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    font-weight: 400;
    color: rgba(237,234,227,.35);
    margin-left: .25rem;
    letter-spacing: .05em;
  }

  h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--paper);
    margin-bottom: .4rem;
  }
  .sub {
    font-size: .82rem;
    color: rgba(237,234,227,.4);
    margin-bottom: 1.75rem;
  }

  .field { margin-bottom: 1.1rem; }
  label {
    display: block;
    font-size: .78rem;
    font-weight: 500;
    color: rgba(237,234,227,.55);
    margin-bottom: .4rem;
    letter-spacing: .03em;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .input-wrap i {
    position: absolute;
    left: .85rem;
    color: rgba(237,234,227,.3);
    font-size: .85rem;
    pointer-events: none;
  }
  input[type=text], input[type=email], input[type=password] {
    width: 100%;
    background: rgba(237,234,227,.06);
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    color: var(--paper);
    font-family: inherit;
    font-size: .9rem;
    padding: .65rem .85rem .65rem 2.4rem;
    outline: none;
    transition: border-color .18s, background .18s;
  }
  input:focus {
    border-color: var(--accent);
    background: rgba(255,122,69,.06);
  }
  .toggle-pw {
    position: absolute;
    right: .75rem;
    background: none;
    border: none;
    color: rgba(237,234,227,.3);
    cursor: pointer;
    padding: 0;
    font-size: .85rem;
    transition: color .15s;
  }
  .toggle-pw:hover { color: var(--paper); }

  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: var(--ink);
    border: none;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    padding: .75rem;
    margin-top: .4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    transition: opacity .15s, transform .1s;
  }
  .btn-submit:hover:not(:disabled)  { opacity: .88; }
  .btn-submit:active:not(:disabled) { transform: scale(.98); }
  .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

  #error-box {
    display: none;
    background: rgba(226,87,76,.12);
    border: 1px solid rgba(226,87,76,.4);
    border-radius: 8px;
    color: var(--fail);
    font-size: .82rem;
    padding: .65rem .85rem;
    margin-top: 1rem;
    line-height: 1.45;
  }
  #error-box.show { display: flex; gap: .5rem; align-items: flex-start; }

  .dots { display: flex; gap: 4px; }
  .dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink);
    animation: bounce .9s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: .15s; }
  .dots span:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(.6)} 40%{transform:scale(1)} }

  .lockout-bar {
    display: none;
    margin-top: 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    color: rgba(237,234,227,.35);
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <a href="#" class="brand">
    <i class="fa-solid fa-circle-half-stroke"></i>
    <span>Seik</span>
    <small>PRIVATE</small>
  </a>

  <h2>Sign in to continue</h2>
  <p class="sub">This application is protected. Enter your credentials.</p>

  <div class="field">
    <label for="username">Username or email</label>
    <div class="input-wrap">
      <i class="fa-solid fa-user"></i>
      <input id="username" type="text" autocomplete="username" placeholder="you@example.com" spellcheck="false" />
    </div>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <div class="input-wrap">
      <i class="fa-solid fa-lock"></i>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••••" />
      <button class="toggle-pw" type="button" tabindex="-1" id="toggle-pw" aria-label="Show/hide password">
        <i class="fa-solid fa-eye" id="eye-icon"></i>
      </button>
    </div>
  </div>

  <button class="btn-submit" id="login-btn">
    <i class="fa-solid fa-right-to-bracket"></i> Sign in
  </button>

  <div id="error-box" role="alert">
    <i class="fa-solid fa-triangle-exclamation" style="margin-top:.1rem;flex-shrink:0"></i>
    <span id="error-msg"></span>
  </div>

  <p class="lockout-bar" id="lockout-bar">
    <i class="fa-solid fa-clock"></i> &nbsp;<span id="lockout-countdown"></span>
  </p>
</div>

<script>
(function () {
  const usernameEl = document.getElementById('username');
  const passwordEl = document.getElementById('password');
  const btn        = document.getElementById('login-btn');
  const errorBox   = document.getElementById('error-box');
  const errorMsg   = document.getElementById('error-msg');
  const lockoutBar = document.getElementById('lockout-bar');
  const countdown  = document.getElementById('lockout-countdown');
  const togglePw   = document.getElementById('toggle-pw');
  const eyeIcon    = document.getElementById('eye-icon');

  let lockoutEnd = null;
  let timer = null;

  // Toggle password visibility
  togglePw.addEventListener('click', () => {
    const hidden = passwordEl.type === 'password';
    passwordEl.type = hidden ? 'text' : 'password';
    eyeIcon.className = hidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
  });

  // Allow Enter key to submit
  [usernameEl, passwordEl].forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
  );

  btn.addEventListener('click', doLogin);

  function showError(msg) {
    errorMsg.textContent = msg;
    errorBox.classList.add('show');
  }
  function hideError() {
    errorBox.classList.remove('show');
  }

  function startLockoutTimer(ms) {
    lockoutBar.style.display = 'block';
    btn.disabled = true;
    lockoutEnd = Date.now() + ms;

    function tick() {
      const remaining = lockoutEnd - Date.now();
      if (remaining <= 0) {
        lockoutBar.style.display = 'none';
        btn.disabled = false;
        clearInterval(timer);
        return;
      }
      const m = Math.floor(remaining / 60000);
      const s = Math.floor((remaining % 60000) / 1000);
      countdown.textContent = `Locked out — try again in ${m}:${String(s).padStart(2,'0')}`;
    }
    tick();
    timer = setInterval(tick, 1000);
  }

  async function doLogin() {
    hideError();
    const username = usernameEl.value.trim();
    const password = passwordEl.value;

    if (!username || !password) {
      showError('Please enter your username and password.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

    try {
      const next = new URLSearchParams(window.location.search).get('next') || '/';
      const res  = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (res.ok) {
        window.location.href = data.redirect || '/';
        return;
      }

      if (res.status === 429) {
        // Extract minutes from message for countdown
        const match = data.error.match(/(\d+) minute/);
        const ms    = match ? Number(match[1]) * 60 * 1000 : 15 * 60 * 1000;
        showError(data.error);
        startLockoutTimer(ms);
      } else {
        showError(data.error || 'Invalid credentials.');
        btn.disabled = false;
      }
    } catch {
      showError('Network error. Please try again.');
      btn.disabled = false;
    }

    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign in';
  }
})();
</script>
</body>
</html>
